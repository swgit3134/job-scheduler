<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Scheduler — Statewide Drilling</title>
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Saira', 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #231F20; min-height: 100vh; overflow-x: hidden; }

#login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 14px; background: #f0f2f5; }
#login-screen h1 { font-size: 22px; font-weight: 700; color: #0039a5; }
#login-screen p { font-size: 13px; color: #666; }
#login-btn { display: flex; align-items: center; gap: 10px; padding: 11px 28px; border: 1px solid #ccc; border-radius: 6px; background: white; cursor: pointer; font-size: 14px; font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
#login-btn:hover { background: #f5f5f5; }
#login-btn:disabled { opacity: 0.6; cursor: default; }
#login-error { color: #c0392b; font-size: 13px; background: #fdf0ed; padding: 8px 16px; border-radius: 6px; border: 1px solid #f5c6c6; max-width: 360px; text-align: center; display: none; }

#app { display: none; flex-direction: column; height: 100vh; }

.topbar { background: #0039a5; color: white; height: 50px; display: flex; align-items: center; padding: 0 12px; gap: 8px; flex-shrink: 0; }
.topbar-brand { display: flex; align-items: center; gap: 7px; }
.brand-logo { width: 32px; height: 32px; }
.topbar-title { font-size: 16px; font-weight: 700; letter-spacing: 0.01em; }
.topbar-sep { width: 1px; height: 26px; background: rgba(255,255,255,0.25); margin: 0 4px; }
.nav-btn { background: none; border: none; color: white; cursor: pointer; width: 30px; height: 30px; border-radius: 4px; font-size: 20px; display: flex; align-items: center; justify-content: center; line-height: 1; }
.nav-btn:hover { background: rgba(255,255,255,0.15); }
.month-label { font-size: 15px; font-weight: 600; min-width: 140px; text-align: center; }
.topbar-spacer { flex: 1; }
.last-refresh-txt { font-size: 10px; color: rgba(255,255,255,0.55); }
.btn-booked { background: #0039a5; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.btn-booked:hover { background: #002d84; }
.btn-booked.active { background: #e67e22; }
.btn-new { background: white; color: #0039a5; border: none; padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-new:hover { background: #eaf0f8; }
.btn-refresh { background: none; border: none; color: white; cursor: pointer; font-size: 18px; width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.btn-refresh:hover { background: rgba(255,255,255,0.15); }
.user-chip { font-size: 11px; background: rgba(255,255,255,0.15); padding: 3px 9px; border-radius: 10px; cursor: pointer; white-space: nowrap; }
.user-chip:hover { background: rgba(255,255,255,0.25); }

.cal-wrap { flex: 1; overflow: auto; }
.cal-grid { display: grid; }

.cal-corner { background: #002d84; color: rgba(255,255,255,0.7); position: sticky; left: 0; z-index: 20; width: 120px; min-width: 120px; border-right: 2px solid #001f6b; border-bottom: 2px solid #001f6b; padding: 5px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; display: flex; align-items: center; }
.cal-date-cell { background: #0039a5; color: white; text-align: center; padding: 4px 2px 5px; border-right: 1px solid rgba(255,255,255,0.12); border-bottom: 2px solid #001f6b; min-width: 92px; width: 92px; cursor: default; }
.cal-date-cell .d-day { font-size: 11px; font-weight: 400; opacity: 0.75; }
.cal-date-cell .d-num { font-size: 15px; font-weight: 700; line-height: 1.2; }
.cal-date-cell .d-mon { font-size: 10px; opacity: 0.65; }
.cal-date-cell.is-today { background: #1a5db5; }
.cal-date-cell.is-weekend { background: #001f6b; }

.row-label { background: #dde6f7; color: #0039a5; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; position: sticky; left: 0; z-index: 10; width: 120px; min-width: 120px; border-right: 2px solid #99b3e0; border-bottom: 1px solid #b3c8e8; padding: 4px 8px; display: flex; align-items: center; }
.day-cell { min-width: 92px; width: 92px; border-right: 1px dashed #b3c8e8; border-bottom: 1px solid #b3c8e8; background: white; padding: 2px 3px; min-height: 72px; cursor: pointer; vertical-align: top; }
.day-cell:hover { background: #f0f7ff; }
.day-cell.is-weekend { background: #f5f8fc; }
.day-cell.is-today { background: #fffde7; }

.jcard { border-radius: 3px; padding: 3px 5px; margin-bottom: 2px; cursor: pointer; border-left: 3px solid rgba(0,0,0,0.18); }
.jcard:hover { filter: brightness(0.9); }
.jcard .jn { font-size: 10px; font-weight: 700; line-height: 1.3; }
.jcard .js { font-size: 9.5px; opacity: 0.8; }
.jcard .jc { font-size: 9px; opacity: 0.65; font-style: italic; }

.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
.modal-box { background: white; border-radius: 10px; width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; padding: 22px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-head h2 { font-size: 17px; font-weight: 600; }
.modal-x { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; padding: 2px 6px; border-radius: 4px; }
.modal-x:hover { background: #f0f0f0; }
.fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.fcol2 { grid-column: 1/-1; }
.fg label { display: block; font-size: 11px; font-weight: 600; color: #555; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.03em; }
.fg input, .fg select, .fg textarea { width: 100%; padding: 7px 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; font-family: inherit; }
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: #0039a5; box-shadow: 0 0 0 2px rgba(36,113,163,0.15); }
.fg input[type=color] { height: 36px; padding: 2px 4px; cursor: pointer; }
.fg textarea { resize: vertical; min-height: 64px; }
.cbrow { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.cbrow input[type=checkbox] { width: 15px; height: 15px; accent-color: #0039a5; flex-shrink: 0; }
.cbrow label { font-size: 13px; font-weight: 400; text-transform: none; letter-spacing: 0; margin-bottom: 0; color: #333; cursor: pointer; }
.mfoot { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 14px; border-top: 1px solid #eee; }
.btn-sv { background: #0039a5; color: white; border: none; padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-sv:hover { background: #002d84; }
.btn-sv:disabled { opacity: 0.6; cursor: default; }
.btn-cn { background: none; border: 1px solid #ccc; padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; color: #555; }
.btn-cn:hover { background: #f5f5f5; }
.btn-dl { background: none; border: none; color: #c0392b; font-size: 13px; cursor: pointer; }
.btn-dl:hover { text-decoration: underline; }

.toast { position: fixed; bottom: 20px; right: 20px; padding: 11px 18px; border-radius: 7px; font-size: 13px; font-weight: 500; z-index: 200; display: none; box-shadow: 0 3px 12px rgba(0,0,0,0.15); }
.toast.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.toast.error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }

.spin-wrap { position: fixed; inset: 0; background: rgba(255,255,255,0.75); display: flex; align-items: center; justify-content: center; z-index: 50; flex-direction: column; gap: 10px; }
.spinner { width: 34px; height: 34px; border: 3px solid #cdd8e8; border-top-color: #0039a5; border-radius: 50%; animation: sp 0.7s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }

@media (max-width: 600px) { .fgrid { grid-template-columns: 1fr; } }
</style>
</head>

<script>
const CLIENT_ID = 'b2580766-8f12-4e30-8180-113536a3bd5d';
const TENANT_ID = '4ef29fa0-9468-4620-8514-1cf4538b9702';
const SITE_URL  = 'statewidedrilling.sharepoint.com:/sites/AppsPortal:';
const LIST_NAME = 'JobScheduler';

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const LONG_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DEFAULT_MACHINES = ['GEOPROBE','GEOPROBE','HANJIN (TRACK)','COM 305','E/PROBE','DINGO','Site Inspection','Yard / Leave'];

const msalCfg = {
  auth: { clientId: CLIENT_ID, authority: `https://login.microsoftonline.com/${TENANT_ID}`, redirectUri: window.location.origin + window.location.pathname },
  cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
};
const SCOPES = ['Sites.ReadWrite.All','User.Read'];
let msalInst=null, allJobs=[], editId=null, siteId=null, weekOff=0, filterOn=false;

// ── AUTH ──────────────────────────────────────────────────────────
async function initMsal() {
  try {
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Loading...';
    msalInst = new msal.PublicClientApplication(msalCfg);
    await msalInst.initialize();
    const r = await msalInst.handleRedirectPromise();
    if (r?.account) { onIn(r.account); return; }
    const accs = msalInst.getAllAccounts();
    if (accs.length) { onIn(accs[0]); return; }
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 21 21" width="20" height="20"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg> Sign in with Microsoft`;
  } catch(e) { loginErr('Init error: '+e.message); document.getElementById('login-btn').disabled=false; }
}
async function signIn() {
  if (!msalInst) return;
  try { document.getElementById('login-btn').disabled=true; document.getElementById('login-btn').textContent='Redirecting...'; await msalInst.loginRedirect({scopes:SCOPES}); }
  catch(e) { loginErr('Sign-in failed: '+e.message); document.getElementById('login-btn').disabled=false; }
}
function signOut() { if(confirm('Sign out?')) msalInst.logoutRedirect(); }
function loginErr(m) { const el=document.getElementById('login-error'); el.textContent=m; el.style.display='block'; }
async function token() {
  const a=msalInst.getAllAccounts();
  try { return (await msalInst.acquireTokenSilent({account:a[0],scopes:SCOPES})).accessToken; }
  catch { await msalInst.acquireTokenRedirect({scopes:SCOPES}); }
}
async function gfetch(method,path,body) {
  const t=await token();
  const o={method,headers:{Authorization:`Bearer ${t}`,'Content-Type':'application/json'}};
  if(body) o.body=JSON.stringify(body);
  const r=await fetch(`https://graph.microsoft.com/v1.0${path}`,o);
  if(!r.ok) throw new Error(await r.text());
  return r.status===204?{}:r.json();
}
async function getSite() {
  if(!siteId) siteId=(await gfetch('GET',`/sites/${SITE_URL}`)).id;
  return siteId;
}

// ── DATA ──────────────────────────────────────────────────────────
async function loadJobs() {
  spin(true);
  try {
    const sid=await getSite();
    const d=await gfetch('GET',`/sites/${sid}/lists/${LIST_NAME}/items?expand=fields&$top=999`);
    allJobs=d.value.map(i=>({id:i.id,...i.fields}));
    document.getElementById('last-refresh').textContent='Last Refresh: '+new Date().toLocaleString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    renderCal();
  } catch(e) { toast('Error: '+e.message,'error'); }
  spin(false);
}

function onIn(acc) {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('user-name').textContent=acc.name||acc.username;
  loadJobs();
}

// ── CALENDAR ──────────────────────────────────────────────────────
function getWeekDates() {
  const today=new Date(); today.setHours(0,0,0,0);
  const dow=today.getDay();
  const mon=new Date(today);
  mon.setDate(today.getDate()-(dow===0?6:dow-1)+weekOff*7);
  return Array.from({length:28},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function getMachines() {
  const fromData=[...new Set(allJobs.map(j=>j.Machine).filter(Boolean))];
  const seen=new Set();
  const result=[];
  DEFAULT_MACHINES.forEach(m=>{ if(!seen.has(m)){seen.add(m);result.push(m);} });
  fromData.forEach(m=>{ if(!seen.has(m)){seen.add(m);result.push(m);} });
  return result;
}

function fdate(d) { return d.toISOString().slice(0,10); }
function isToday(d) { return fdate(d)===fdate(new Date()); }
function isWknd(d) { return d.getDay()===0||d.getDay()===6; }

function jobOnDate(j,d) {
  if(!j.Start_x0020_Date) return false;
  const s=new Date(j.Start_x0020_Date); s.setHours(0,0,0,0);
  const e=j.End_x0020_Date?new Date(j.End_x0020_Date):new Date(s);
  e.setHours(0,0,0,0);
  const c=new Date(d); c.setHours(0,0,0,0);
  return c>=s&&c<=e;
}

function jobColor(j) {
  if(j.ColorCode&&j.ColorCode.match(/^#[0-9a-fA-F]{6}$/)) return j.ColorCode;
  const s=(j.Status||'').toLowerCase();
  if(s==='completed') return '#c8e6c9';
  if(s==='cancelled') return '#ffcdd2';
  if(s==='in progress') return '#fff9c4';
  return '#bbdefb';
}

function isLight(hex) {
  const c=hex.replace('#','');
  if(c.length!==6) return true;
  return (parseInt(c.substr(0,2),16)*299+parseInt(c.substr(2,2),16)*587+parseInt(c.substr(4,2),16)*114)/1000>150;
}

function xe(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderCal() {
  const dates=getWeekDates();
  const machines=getMachines();
  const grid=document.getElementById('cal-grid');

  // month label
  const f=dates[0], l=dates[dates.length-1];
  const ml = f.getMonth()===l.getMonth()&&f.getFullYear()===l.getFullYear()
    ? LONG_MONTHS[f.getMonth()]+' '+f.getFullYear()
    : MONTHS[f.getMonth()]+' – '+MONTHS[l.getMonth()]+' '+l.getFullYear();
  document.getElementById('month-label').textContent=ml;

  grid.style.gridTemplateColumns=`120px repeat(${dates.length},92px)`;

  let h='';

  // Header
  h+=`<div class="cal-corner">DATE</div>`;
  dates.forEach(d=>{
    const cls=[isToday(d)?'is-today':'',isWknd(d)?'is-weekend':''].join(' ').trim();
    h+=`<div class="cal-date-cell ${cls}"><div class="d-day">${DAYS[d.getDay()]}</div><div class="d-num">${d.getDate()}</div><div class="d-mon">${MONTHS[d.getMonth()]}</div></div>`;
  });

  // Machine rows
  machines.forEach(machine=>{
    h+=`<div class="row-label">${xe(machine)}</div>`;
    dates.forEach(d=>{
      const ds=fdate(d);
      let jobs=allJobs.filter(j=>{
        if((j.Machine||'')!==machine) return false;
        if(!jobOnDate(j,d)) return false;
        if(filterOn) return j.Status==='Scheduled'||!j.Status;
        return true;
      });
      const cc=['day-cell',isWknd(d)?'is-weekend':'',isToday(d)?'is-today':''].filter(Boolean).join(' ');
      h+=`<div class="${cc}" onclick="openNew('${xe(machine)}','${ds}')">`;
      jobs.forEach(j=>{
        const bg=jobColor(j);
        const tc=isLight(bg)?'#111':'#fff';
        h+=`<div class="jcard" style="background:${bg};color:${tc}" onclick="event.stopPropagation();openEdit('${j.id}')">
          <div class="jn">${xe(j.JobNumber||'')}${j.JobNumber&&j.Suburb?' - ':''}${xe(j.Suburb||j.Title||'')}</div>
          ${j.Crew?`<div class="jc">${xe(j.Crew)}</div>`:''}
        </div>`;
      });
      h+=`</div>`;
    });
  });

  grid.innerHTML=h;
}

function shiftWeeks(n) { weekOff+=n; renderCal(); }
function toggleFilter() {
  filterOn=!filterOn;
  document.getElementById('filter-btn').classList.toggle('active',filterOn);
  renderCal();
}

// ── MODAL ──────────────────────────────────────────────────────────
function openNew(machine,dateStr) {
  editId=null;
  document.getElementById('m-title').textContent='New Job';
  document.getElementById('save-btn').textContent='Save Job';
  document.getElementById('del-btn').style.display='none';
  clearForm();
  if(machine) document.getElementById('f-machine').value=machine;
  if(dateStr) {
    document.getElementById('f-startdate').value=dateStr+'T08:00';
    document.getElementById('f-enddate').value=dateStr+'T17:00';
  }
  document.getElementById('modal-bg').style.display='flex';
}
function openAddModal(m,d) { openNew(m||'',d||''); }

function openEdit(id) {
  const j=allJobs.find(x=>x.id===id); if(!j) return;
  editId=id;
  document.getElementById('m-title').textContent='Edit Job';
  document.getElementById('save-btn').textContent='Update Job';
  document.getElementById('del-btn').style.display='block';
  document.getElementById('f-title').value=j.Title||'';
  document.getElementById('f-jobnumber').value=j.JobNumber||'';
  document.getElementById('f-status').value=j.Status||'Scheduled';
  document.getElementById('f-jobtype').value=j.JobType||'';
  document.getElementById('f-machine').value=j.Machine||'';
  document.getElementById('f-suburb').value=j.Suburb||'';
  document.getElementById('f-crew').value=j.Crew||'';
  document.getElementById('f-colorcode').value=j.ColorCode||'#a8d5f5';
  document.getElementById('f-notes').value=j.Notes||'';
  document.getElementById('f-tf').checked=!!j.TriggerFlow;
  document.getElementById('f-ca').checked=!!j['Client_x0020_has_x0020_approved_x0020_site_x0020_access'];
  document.getElementById('f-bk').checked=!!j['Booking_x0020_the_x0020_subcontractor_x0020_for_x0020_service_x0020_clearance'];
  document.getElementById('f-startdate').value=j.Start_x0020_Date?j.Start_x0020_Date.slice(0,16):'';
  document.getElementById('f-enddate').value=j.End_x0020_Date?j.End_x0020_Date.slice(0,16):'';
  document.getElementById('modal-bg').style.display='flex';
}

function clearForm() {
  ['f-title','f-jobnumber','f-jobtype','f-machine','f-suburb','f-crew','f-notes','f-startdate','f-enddate'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-status').value='Scheduled';
  document.getElementById('f-colorcode').value='#a8d5f5';
  ['f-tf','f-ca','f-bk'].forEach(id=>document.getElementById(id).checked=false);
}

function closeModal() { document.getElementById('modal-bg').style.display='none'; }
function bgClose(e) { if(e.target===document.getElementById('modal-bg')) closeModal(); }

async function saveJob() {
  const title=document.getElementById('f-title').value.trim();
  if(!title){toast('Title is required','error');return;}
  const fields={
    Title:title,
    JobNumber:document.getElementById('f-jobnumber').value,
    Status:document.getElementById('f-status').value,
    JobType:document.getElementById('f-jobtype').value,
    Machine:document.getElementById('f-machine').value,
    Suburb:document.getElementById('f-suburb').value,
    Crew:document.getElementById('f-crew').value,
    Color:document.getElementById('f-colorcode').value,
    ColorCode:document.getElementById('f-colorcode').value,
    Notes:document.getElementById('f-notes').value,
    TriggerFlow:document.getElementById('f-tf').checked,
    'Client_x0020_has_x0020_approved_x0020_site_x0020_access':document.getElementById('f-ca').checked,
    'Booking_x0020_the_x0020_subcontractor_x0020_for_x0020_service_x0020_clearance':document.getElementById('f-bk').checked,
  };
  const sd=document.getElementById('f-startdate').value;
  const ed=document.getElementById('f-enddate').value;
  if(sd) fields['Start_x0020_Date']=new Date(sd).toISOString();
  if(ed) fields['End_x0020_Date']=new Date(ed).toISOString();
  const btn=document.getElementById('save-btn');
  btn.textContent='Saving...'; btn.disabled=true;
  try {
    const sid=await getSite();
    if(editId) { await gfetch('PATCH',`/sites/${sid}/lists/${LIST_NAME}/items/${editId}/fields`,fields); toast('Job updated ✓','success'); }
    else { await gfetch('POST',`/sites/${sid}/lists/${LIST_NAME}/items`,{fields}); toast('Job created ✓','success'); }
    closeModal(); loadJobs();
  } catch(e) { toast('Error: '+e.message,'error'); }
  btn.textContent=editId?'Update Job':'Save Job'; btn.disabled=false;
}

async function deleteJob() {
  if(!editId) return;
  const j=allJobs.find(x=>x.id===editId);
  if(!confirm(`Delete "${j?j.Title:'this job'}"?`)) return;
  try {
    const sid=await getSite();
    await gfetch('DELETE',`/sites/${sid}/lists/${LIST_NAME}/items/${editId}`);
    toast('Deleted','success'); closeModal(); loadJobs();
  } catch(e) { toast('Error: '+e.message,'error'); }
}

// ── UTILS ──────────────────────────────────────────────────────────
let spinEl=null;
function spin(on) {
  if(on&&!spinEl) { spinEl=document.createElement('div'); spinEl.className='spin-wrap'; spinEl.innerHTML='<div class="spinner"></div><div style="font-size:13px;color:#555">Loading...</div>'; document.body.appendChild(spinEl); }
  else if(!on&&spinEl) { spinEl.remove(); spinEl=null; }
}

function toast(msg,type='success') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',3500);
}

initMsal();
</script>
